    const searchInput = document.getElementById('searchInput');
    const resultsList = document.getElementById('resultsList');
    const noResults = document.getElementById('noResults');
    const micBtn = document.getElementById('micBtn');
    const codeModal = document.getElementById('codeModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const modalCode = document.getElementById('modalCode');
    const modalName = document.getElementById('modalName');
    const toast = document.getElementById('toast');

    function renderList(items) {
        resultsList.innerHTML = '';

        if (items.length === 0) {
            noResults.classList.remove('hidden');
        } else {
            noResults.classList.add('hidden');

            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm active:bg-blue-50 dark:active:bg-gray-700 flex justify-between items-center cursor-pointer transition-colors';

                li.innerHTML = `
                        <div class="pr-4 flex-1">
                            <h3 class="text-lg font-medium text-gray-900 dark:text-white">${item.name}</h3>
                        </div>
                        <div class="bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300 font-bold text-xl py-1 px-3 rounded-lg tabular-nums shrink-0">
                            ${item.code}
                        </div>
                    `;

                li.addEventListener('click', () => openModal(item));
                resultsList.appendChild(li);
            });
        }
    }

    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();

        if (!query) {
            renderList(products);
            return;
        }

        const filtered = products.filter(p =>
            p.name.toLowerCase().includes(query) ||
            p.code.includes(query)
        );

        renderList(filtered);
    });

    function openModal(item) {
        modalCode.textContent = item.code;
        modalName.textContent = item.name;

        searchInput.blur();

        codeModal.classList.remove('hidden');
        setTimeout(() => {
            codeModal.classList.remove('translate-y-full');
        }, 10);
    }

    function closeModal() {
        codeModal.classList.add('translate-y-full');
        setTimeout(() => {
            codeModal.classList.add('hidden');
        }, 300);
    }

    closeModalBtn.addEventListener('click', closeModal);

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = function() {
            micBtn.classList.add('mic-active');
            searchInput.placeholder = "Слушаю...";
        };

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            const cleanTranscript = transcript.replace(/\.$/, '');

            searchInput.value = cleanTranscript;

            searchInput.dispatchEvent(new Event('input'));
        };

        recognition.onerror = function(event) {
            console.error("Speech recognition error", event.error);
            showToast("Ошибка микрофона: " + event.error);
        };

        recognition.onend = function() {
            micBtn.classList.remove('mic-active');
            searchInput.placeholder = "Поиск продукта...";
        };

        micBtn.addEventListener('click', () => {
            try {
                recognition.start();
            } catch (e) {
                recognition.stop();
            }
        });
    } else {
        micBtn.style.display = 'none';
        console.log("Web Speech API не поддерживается в этом браузере.");
    }

    function showToast(message) {
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, 3000);
    }

    renderList(products);
